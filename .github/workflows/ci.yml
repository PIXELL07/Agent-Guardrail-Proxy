name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --asyncio-mode=auto

  docker-build:
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t agent-guardrail-proxy:ci .

      - name: Smoke test the built image
        run: |
          docker run -d --name guardrail-smoke -p 8000:8000 \
            -e API_KEYS=ci-smoke-key \
            agent-guardrail-proxy:ci
          # Give the container a moment to start before probing it.
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "Container is up"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:8000/health || (docker logs guardrail-smoke && exit 1)
          docker stop guardrail-smoke

      - name: Validate docker-compose configs
        run: |
          API_KEYS=ci-key CORS_ORIGINS=https://example.com DOMAIN=example.com \
            docker compose -f docker-compose.yml config > /dev/null
          API_KEYS=ci-key CORS_ORIGINS=https://example.com DOMAIN=example.com \
            docker compose -f docker-compose.yml -f docker-compose.prod.yml config > /dev/null

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
